<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photon Grid — Sorting Example</title>
  <script src="https://cdn.jsdelivr.net/npm/photon-grid-core@2.0.1/photon-grid.min.js"></script>
  <style>
    html, body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #grid { width: 100%; height: 460px; }
    .toolbar { padding: 8px 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .toolbar button { padding: 6px 12px; border: 1px solid #d0d5dd; background: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .toolbar button:hover { background: #f5f7fa; }
    .status { font-size: 13px; margin-left: auto; color: #475467; }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="sortAsc">Salary ascending</button>
    <button id="sortDesc">Salary descending</button>
    <button id="multi">Dept + salary</button>
    <button id="clear">Clear sort</button>
    <span class="status" id="status">No sort applied</span>
  </div>
  <div id="grid"></div>
  <script src="./index.js"></script>
</body>
</html>
