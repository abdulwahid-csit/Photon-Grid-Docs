<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photon Grid — Row Actions Example</title>
  <script src="https://cdn.jsdelivr.net/npm/photon-grid-core@2.0.1/photon-grid.min.js"></script>
  <style>
    html, body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #grid { width: 100%; height: 330px; }
    .toolbar { padding: 8px 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .pg-action { padding: 4px 10px; border: 1px solid #d0d5dd; background: #fff; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .pg-action:hover { background: #f5f7fa; }
    #log { height: 110px; overflow: auto; margin: 8px 12px; padding: 8px; background: #0f172a; color: #e2e8f0; border-radius: 6px; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; }
    #log div { padding: 1px 0; }
  </style>
</head>
<body>
  <div id="grid"></div>
  <div id="log"></div>
  <script src="./index.js"></script>
</body>
</html>
