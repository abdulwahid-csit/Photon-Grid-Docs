<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photon Grid — Key Features Example</title>
  <script src="https://cdn.jsdelivr.net/npm/photon-grid-core@2.0.1/photon-grid.min.js"></script>
  <style>
    html, body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #grid { width: 100%; height: 460px; }
    .toolbar { padding: 8px 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .toolbar button { padding: 6px 12px; border: 1px solid #d0d5dd; background: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .toolbar button:hover { background: #f5f7fa; }
    .toolbar input { padding: 6px 10px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <input id="quickFilter" type="text" placeholder="Quick filter..." />
    <button id="sortSalary">Sort by salary</button>
    <button id="clearSort">Clear sort</button>
    <span id="status"></span>
  </div>
  <div id="grid"></div>
  <script src="./index.js"></script>
</body>
</html>
